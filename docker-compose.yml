services:
  agent:
    build: .                    # your Dockerfile — FROM hamroh-base (built by `make`)
    env_file: .env
    restart: on-failure
    volumes:
      # Single files and empty dirs are safe to mount — nothing baked to mask.
      # prompts/ and skills/ are NOT mounted: they're baked in the Dockerfile
      # so the framework's system.md, subagents.md, and built-in skills survive.
      - ./data:/app/data
      # Read-write — the bot writes its own memories here; commit them
      # with scripts/commit-memories.sh (make update does it for you).
      - ./memories:/app/memories
      - ./plugins.json:/app/plugins.json
      - ./access.json:/app/access.json
      - ./default-reminders.json:/app/default-reminders.json:ro
      # Claude Code session files, so conversations resume across restarts.
      # Auth is NOT taken from here — it comes from CLAUDE_CODE_OAUTH_TOKEN
      # in .env (see .env.example). The env-var token takes precedence over
      # any mounted credentials, so this works the same on Linux/macOS/Windows.
      - ~/.claude:/root/.claude
      - ~/.claude.json:/root/.claude.json
    working_dir: /app
    stop_grace_period: 15s
