services:
  agent:
    build: .                    # your Dockerfile — FROM hamroh-base (built by `make`)
    env_file: .env
    restart: on-failure
    volumes:
      # Single files and empty dirs are safe to mount — nothing baked to mask.
      # prompts/ and skills/ are NOT mounted: they're baked in the Dockerfile
      # so the framework's system.md, subagents.md, and built-in skills survive.
      - ./data:/app/data
      - ./memories:/app/memories:ro
      - ./plugins.json:/app/plugins.json
      - ./access.json:/app/access.json
      - ./default-reminders.json:/app/default-reminders.json:ro
      - ~/.claude:/root/.claude
      - ~/.claude.json:/root/.claude.json
    working_dir: /app
    stop_grace_period: 15s
