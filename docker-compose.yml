services:
  agent:
    build: .                    # your Dockerfile — FROM hamroh-base (built by `make`)
    env_file: .env
    restart: on-failure
    volumes:
      # prompts/ stays baked in the Dockerfile so the framework's system.md
      # and subagents.md survive; only project.md is mounted as a single file
      # below, so the bot's instruction_append edits land in this checkout
      # and survive rebuilds (commit-and-push.sh commits them before pulls).
      - ./data:/app/data
      - ./prompts/project.md:/app/prompts/project.md
      # Skill playbooks — bind-mounted read-write so host edits AND the bot's
      # own write_skill land in this git-tracked checkout, live without a
      # rebuild. The host skills/ tree now holds the framework built-ins
      # (reminder-format, render-style, self-reflection) seeded alongside this
      # bot's custom skills, so this whole-dir mount is the complete set the
      # image expects — it masks the baked copy without dropping anything.
      - ./skills:/app/skills
      # Read-write — the bot writes its own memories here; commit them
      # with scripts/commit-and-push.sh (make update does it for you).
      - ./memories:/app/memories
      - ./plugins.json:/app/plugins.json
      - ./access.json:/app/access.json
      - ./default-reminders.json:/app/default-reminders.json:ro
      # Claude Code session files, so conversations resume across restarts.
      # Auth is NOT taken from here — it comes from CLAUDE_CODE_OAUTH_TOKEN
      # in .env (see .env.example). The env-var token takes precedence over
      # any mounted credentials, so this works the same on Linux/macOS/Windows.
      - ~/.claude:/root/.claude
      - ~/.claude.json:/root/.claude.json
    working_dir: /app
    stop_grace_period: 15s
